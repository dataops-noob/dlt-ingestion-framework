# GitHub Actions CI/CD Pipeline for Databricks Asset Bundles
# https://docs.databricks.com/aws/en/dev-tools/ci-cd/github

name: DLT Ingestion Framework CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  # Databricks CLI version
  DATABRICKS_CLI_VERSION: 0.220.0

jobs:
  # =============================================================================
  # VALIDATE
  # =============================================================================
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Databricks CLI
        run: |
          pip install databricks-cli==${{ env.DATABRICKS_CLI_VERSION }}
          databricks --version
      
      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
      
      - name: Validate bundle schema
        run: |
          databricks bundle validate -t dev
      
      - name: Run Python tests
        run: |
          pip install pytest pyspark
          pytest tests/ -v || echo "Tests completed"

  # =============================================================================
  # DEPLOY TO DEV
  # =============================================================================
  deploy-dev:
    name: Deploy to Dev
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.workspace_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Databricks CLI
        run: |
          pip install databricks-cli==${{ env.DATABRICKS_CLI_VERSION }}
      
      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
      
      - name: Deploy bundle to dev
        id: deploy
        run: |
          databricks bundle deploy -t dev
          echo "workspace_url=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_OUTPUT
      
      - name: Run DLT pipeline (optional)
        if: github.event.inputs.run_pipeline == 'true'
        run: |
          databricks bundle run -t dev run_dlt_ingestion

  # =============================================================================
  # DEPLOY TO STAGING
  # =============================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.workspace_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Databricks CLI
        run: |
          pip install databricks-cli==${{ env.DATABRICKS_CLI_VERSION }}
      
      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
      
      - name: Deploy bundle to staging
        id: deploy
        run: |
          databricks bundle deploy -t staging
          echo "workspace_url=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_OUTPUT
      
      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          # Add integration test commands here

  # =============================================================================
  # DEPLOY TO PRODUCTION
  # =============================================================================
  deploy-prod:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.workspace_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Databricks CLI
        run: |
          pip install databricks-cli==${{ env.DATABRICKS_CLI_VERSION }}
      
      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
      
      - name: Deploy bundle to production
        id: deploy
        run: |
          databricks bundle deploy -t prod
          echo "workspace_url=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_OUTPUT
      
      - name: Notify deployment success
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "DLT Ingestion Framework deployed to production successfully!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # =============================================================================
  # DESTROY (for cleanup)
  # =============================================================================
  destroy:
    name: Destroy Dev Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Databricks CLI
        run: |
          pip install databricks-cli==${{ env.DATABRICKS_CLI_VERSION }}
      
      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg << EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          EOF
      
      - name: Destroy dev environment
        run: |
          databricks bundle destroy -t dev --auto-approve
