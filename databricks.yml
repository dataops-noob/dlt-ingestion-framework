# Databricks Asset Bundle for DLT Ingestion Framework
# Documentation: https://docs.databricks.com/aws/en/dev-tools/bundles/

bundle:
  name: dlt-ingestion-framework
  version: 1.0.0
  description: |
    Configuration-driven data ingestion framework using Delta Live Tables.
    Supports JDBC, Kafka, REST APIs, and Cloud Storage sources with built-in auditing.

variables:
  catalog:
    description: Unity Catalog name
    default: data_platform
  schema_prefix:
    description: Schema prefix for bronze layer
    default: bronze
  audit_schema:
    description: Schema for audit tables
    default: audit
  environment:
    description: Deployment environment
    default: dev
  
  # Source credentials (use Databricks secrets in production)
  crm_db_host:
    description: CRM Database host
    default: ${CRM_DB_HOST}
  crm_db_user:
    description: CRM Database username
    default: ${CRM_DB_USER}
  crm_db_password:
    description: CRM Database password
    default: ${CRM_DB_PASSWORD}
  
  kafka_bootstrap_servers:
    description: Kafka bootstrap servers
    default: ${KAFKA_BOOTSTRAP_SERVERS}
  
  azure_storage_account:
    description: Azure Storage Account
    default: ${AZURE_STORAGE_ACCOUNT}

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    artifacts:
      notebook_path: ${workspace.root_path}/notebooks
    variables:
      catalog: data_platform_dev
      schema_prefix: bronze_dev
      audit_schema: audit_dev
      environment: dev
    
  staging:
    mode: production
    workspace:
      host: https://your-workspace.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: data_platform_staging
      schema_prefix: bronze_staging
      audit_schema: audit_staging
      environment: staging
    run_as:
      service_principal: ${workspace.current_user.userName}
    
  prod:
    mode: production
    workspace:
      host: https://your-workspace.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: data_platform
      schema_prefix: bronze
      audit_schema: audit
      environment: prod
    run_as:
      service_principal: ${workspace.current_user.userName}
    permissions:
      - user_name: data-engineers@company.com
        level: CAN_MANAGE
      - group_name: data-analysts
        level: CAN_VIEW

artifacts:
  notebooks:
    type: notebook
    source: src/pipelines
    destination: ${workspace.root_path}/notebooks
  
  config:
    type: file
    source: config
    destination: ${workspace.root_path}/config
